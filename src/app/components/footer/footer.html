<footer class="footer">
  <div class="footer-container">
    <div class="footer-content">
      <div class="footer-section">
        <p class="copyright">© {{ currentYear }} Okropir Gudavadze</p>
      </div>

      <div class="footer-section">
        <p class="author">Created by <span class="author-name">Okropir Gudavadze</span></p>
      </div>

      <div class="footer-section">
        <a
          [href]="githubUrl()"
          class="github-link"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="GitHub Profile"
        >
          <i class="fa-brands fa-github"></i>
          <span>GitHub</span>
        </a>
      </div>
    </div>

    <div class="footer-bottom">
      <p class="footer-note">Film Collection App - All rights reserved</p>
    </div>
  </div>
</footer>
